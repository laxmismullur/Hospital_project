server.port=8085

# MySQL Configuration (primary)
spring.datasource.url=jdbc:mysql://localhost:3306/lm_hospital_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:lmuser}
spring.datasource.password=${DB_PASSWORD:mysql@123}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
lm.app.jwtSecret=lmHospitalSecretKey2024SuperSecureKeyForJWTTokenGeneration
lm.app.jwtExpirationMs=86400000

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator for Prometheus monitoring
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

logging.level.com.lm.hospital=DEBUG
