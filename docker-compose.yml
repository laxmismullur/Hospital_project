version: '3.8'

services:

  # ── MySQL Database ────────────────────────────────────────────
  lm-mysql:
    image: mysql:8.0
    container_name: lm_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-LMHospital@2024}
      MYSQL_DATABASE: lm_hospital_db
      MYSQL_USER: ${DB_USERNAME:-lmuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lmpassword}
    ports:
      - "3306:3306"
    volumes:
      - lm_mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-LMHospital@2024}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lm_network

  # ── Spring Boot Backend ───────────────────────────────────────
  lm-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lm_backend
    restart: always
    depends_on:
      lm-mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://lm-mysql:3306/lm_hospital_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME:-lmuser}
      DB_PASSWORD: ${DB_PASSWORD:-lmpassword}
      LM_APP_JWTSECRET: ${JWT_SECRET:-lmHospitalSecretKey2024SuperSecureKeyForJWTTokenGeneration}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lm_network

  # ── React Frontend (Nginx) ────────────────────────────────────
  lm-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lm_frontend
    restart: always
    depends_on:
      - lm-backend
    ports:
      - "80:80"
    networks:
      - lm_network

  # ── Prometheus ────────────────────────────────────────────────
  lm-prometheus:
    image: prom/prometheus:latest
    container_name: lm_prometheus
    restart: always
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - lm_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    networks:
      - lm_network

  # ── Grafana ───────────────────────────────────────────────────
  lm-grafana:
    image: grafana/grafana:latest
    container_name: lm_grafana
    restart: always
    depends_on:
      - lm-prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-lmadmin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-lmgrafana}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - lm_grafana_data:/var/lib/grafana
      - ./devops/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - lm_network

volumes:
  lm_mysql_data:
  lm_prometheus_data:
  lm_grafana_data:

networks:
  lm_network:
    driver: bridge
