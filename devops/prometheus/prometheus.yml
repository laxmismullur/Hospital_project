global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'lm-hospital-monitor'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot backend via Micrometer Actuator
  - job_name: 'lm-hospital-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['lm-backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'lm-hospital-backend'

  # Node Exporter (EC2 host metrics — add if running on EC2)
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
